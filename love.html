<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Love Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Sacramento&display=swap');

    /* Reset and base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      background: linear-gradient(135deg, #ffe6f0 0%, #ff8fb1 100%);
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow: hidden;
      color: #fff;
      user-select: none;
      perspective: 800px;
    }

    /* Container for all content with smooth fade and upward slide on load */
    .container {
      text-align: center;
      animation: fadeUpIn 1.5s ease forwards;
      opacity: 0;
      transform: translateY(30px);
      position: relative;
      z-index: 10;
    }

    @keyframes fadeUpIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Heart style */
    .heart {
      font-size: 140px;
      color: #ff2d55;
      filter: drop-shadow(0 0 10px #ff2d55aa);
      cursor: pointer;
      transform-style: preserve-3d;
      animation: pulseGlow 1.8s infinite ease-in-out, idleSwing 6s ease-in-out infinite;
      transition: transform 0.3s ease;
      user-select: none;
      display: inline-block;
      position: relative;
      text-shadow:
         0 0 8px #ff2d55,
         0 0 15px #ff2d55,
         0 0 20px #ff739a,
         0 0 25px #ff739a;
      overflow: visible;
    }

    .heart:hover {
      animation-play-state: paused;
      transform: scale(1.3) rotateY(15deg) rotateX(10deg);
      filter: drop-shadow(0 0 20px #ff4971);
      text-shadow:
         0 0 12px #ff2d55,
         0 0 25px #ff2d55,
         0 0 30px #ff739a,
         0 0 45px #ff739a;
    }

    /* Sparkles container */
    .heart .sparkle {
      position: absolute;
      background: radial-gradient(circle, #fff8 60%, transparent 80%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: sparkleTwinkle 2s infinite;
      filter: drop-shadow(0 0 6px #ff9eb2);
      z-index: 5;
    }
    .sparkle:nth-child(1) {
      width: 10px; height: 10px;
      top: 15%;
      left: 30%;
      animation-delay: 0s;
    }
    .sparkle:nth-child(2) {
      width: 7px; height: 7px;
      top: 50%;
      left: 70%;
      animation-delay: 0.4s;
    }
    .sparkle:nth-child(3) {
      width: 9px; height: 9px;
      top: 80%;
      left: 40%;
      animation-delay: 1s;
    }
    .sparkle:nth-child(4) {
      width: 6px; height: 6px;
      top: 35%;
      left: 55%;
      animation-delay: 1.4s;
    }
    .sparkle:nth-child(5) {
      width: 8px; height: 8px;
      top: 22%;
      left: 80%;
      animation-delay: 1.8s;
    }

    @keyframes sparkleTwinkle {
      0%, 100% {
        opacity: 0;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* Pulse with glow */
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1) translateZ(0); filter: drop-shadow(0 0 10px #ff2d55aa);}
      50% { transform: scale(1.25) translateZ(20px); filter: drop-shadow(0 0 20px #ff4971ff);}
    }
    /* Gentle swinging idle animation */
    @keyframes idleSwing {
      0%, 100% { transform: scale(1) rotateZ(0deg); }
      25% { transform: scale(1.03) rotateZ(-3deg); }
      50% { transform: scale(1) rotateZ(0deg); }
      75% { transform: scale(1.03) rotateZ(3deg); }
    }

    /* Message style */
    .message {
      margin-top: 24px;
      font-family: 'Sacramento', cursive;
      font-size: 3.2rem;
      color: #b60000;
      letter-spacing: 0.06em;
      text-shadow:
         0 2px 8px rgba(0,0,0,0.15);
      opacity: 0;
      animation: fadeInUp 2s forwards;
      animation-delay: 1.6s;
      user-select: none;
      position: relative;
      /* overflow: visible; */
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Floating hearts background */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      overflow: visible;
      z-index: 2;
    }

    .floating-hearts span {
      position: absolute;
      bottom: -60px;
      font-size: 20px;
      color: #ff648a;
      opacity: 0.8;
      animation-name: floatUp;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-duration: 6s;
      animation-delay: 0s;
      user-select: none;
      filter: drop-shadow(0 0 2px #ff4d6d);
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotateZ(0deg);
        opacity: 0.8;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) rotateZ(360deg);
        opacity: 0;
      }
    }

    /* Message hearts floating */
    .message-heart {
      position: absolute;
      font-size: 16px;
      color: #ff4d6d;
      filter: drop-shadow(0 0 3px #ff4d6d99);
      opacity: 0;
      pointer-events: none;
      animation-timing-function: ease-out;
      user-select: none;
      will-change: transform, opacity;
    }
  </style>
</head>
<body>
  <div class="container" role="main" aria-label="Love message">
    <div class="heart" aria-label="Pulsing heart" tabindex="0" role="img" >
      ❤️
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>
    <div class="message">I Love You Baby</div>
  </div>

  <div class="floating-hearts" aria-hidden="true"></div>

  <script>
    // Generate animated floating hearts behind the main content
    const floatingHeartsContainer = document.querySelector('.floating-hearts');
    const colors = ['#ff4d6d', '#ff7596', '#ff87a2', '#ffb0bb'];
    const heartCount = 25;
    for(let i = 0; i < heartCount; i++) {
      const heart = document.createElement('span');
      heart.textContent = '❤️';
      heart.style.left = (Math.random() * 100) + 'vw';
      heart.style.fontSize = (12 + Math.random() * 18) + 'px';
      heart.style.color = colors[Math.floor(Math.random() * colors.length)];
      heart.style.animationDuration = (4 + Math.random() * 5) + 's';
      heart.style.animationDelay = (Math.random() * 10) + 's';

      floatingHeartsContainer.appendChild(heart);
    }

    // Add keyboard accessibility for heart interaction
    const heartEl = document.querySelector('.heart');
    heartEl.addEventListener('click', () => {
      alert("❤️ Love you forever! ❤️");
    });
    heartEl.addEventListener('keydown', (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        heartEl.click();
      }
    });

    // Floating hearts from message
    const messageEl = document.querySelector('.message');

    function createFloatingMessageHeart() {
      const mHeart = document.createElement('span');
      mHeart.textContent = '❤️';
      mHeart.className = 'message-heart';
      document.body.appendChild(mHeart);

      // Starting position near the message
      const rect = messageEl.getBoundingClientRect();
      mHeart.style.left = (rect.left + rect.width / 2 + (Math.random() * 30 - 15)) + 'px';
      mHeart.style.top = (rect.top + 10) + 'px';

      // Random animation duration and distance
      const duration = 3000 + Math.random() * 2000;
      const distX = (Math.random() * 60 - 30);
      const distY = 80 + Math.random() * 40;

      mHeart.style.opacity = 1;

      let start = null;
      function animate(timestamp) {
        if (!start) start = timestamp;
        let progress = timestamp - start;
        let fraction = progress / duration;
        if (fraction > 1) fraction = 1;

        mHeart.style.transform = `translate(${distX * fraction}px, -${distY * fraction}px) scale(${1 - fraction}) rotate(${fraction * 720}deg)`;
        mHeart.style.opacity = 1 - fraction;

        if (fraction < 1) {
          requestAnimationFrame(animate);
        } else {
          mHeart.remove();
        }
      }
      requestAnimationFrame(animate);
    }

    setInterval(() => {
      createFloatingMessageHeart();
    }, 1200);

  </script>
</body>
</html>
